spring:
  application:
    name: arca
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arca}
    username: ${DATABASE_USERNAME:arca}
    password: ${DATABASE_PASSWORD:arca}
  jpa:
    hibernate:
      # Liquibase owns the schema; Hibernate only maps to it.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Keep /actuator/health DB-free so the API stays warm while Neon scales to zero.
    db:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-0123456789-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  demo:
    password: ${DEMO_PASSWORD:demo1234}
    reset-enabled: ${DEMO_RESET_ENABLED:true}
  storage:
    # Local filesystem receipt store for dev; swapped for Supabase Storage at deploy.
    local-dir: ${RECEIPTS_LOCAL_DIR:./data/receipts}
