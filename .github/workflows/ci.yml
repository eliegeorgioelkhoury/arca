name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege. Scaffold jobs stay green until code lands, then activate automatically.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect backend
        id: detect
        run: |
          if [ -f backend/pom.xml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Set up JDK 17
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build, lint & test
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: ./mvnw -B verify
      - name: Awaiting backend scaffold
        if: steps.detect.outputs.present == 'false'
        run: echo "backend/ not present yet — GATE 1 scaffold. Milestones 1-3 activate this job."

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci
      - name: Lint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint
      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run build
      - name: Awaiting frontend scaffold
        if: steps.detect.outputs.present == 'false'
        run: echo "frontend/ not present yet — GATE 1 scaffold. Milestone 4 activates this job."

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Detect app
        id: detect
        run: |
          if [ -f frontend/package.json ] && [ -f backend/pom.xml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Set up JDK 17
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Prime backend (download deps, compile)
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: ./mvnw -B -q -DskipTests test-compile
      - name: Install frontend deps
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E (boots backend + frontend, drives the happy path)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run e2e
      - name: Awaiting app scaffold
        if: steps.detect.outputs.present == 'false'
        run: echo "backend + frontend not both present yet."

  image:
    name: Backend image (build only)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f infra/Dockerfile ] && [ -f backend/pom.xml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Set up Buildx
        if: steps.detect.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push — confirms the Dockerfile builds a runnable image)
        if: steps.detect.outputs.present == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: false
          tags: arca-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Awaiting Dockerfile
        if: steps.detect.outputs.present == 'false'
        run: echo "infra/Dockerfile not present yet."
